<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Declarant BY</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f4f5f7;color:#17191c;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{max-width:820px;margin:auto;padding:16px}.hero{background:#171717;color:#fff;border-radius:24px;padding:24px}
    .card{background:#fff;border-radius:20px;padding:18px;margin-top:14px;box-shadow:0 8px 28px rgba(0,0,0,.06)}
    h1,h2,h3{margin-top:0}.muted{color:#777;font-size:14px}.hidden{display:none}
    button,.btn{border:0;border-radius:13px;padding:14px 16px;font-size:15px;font-weight:700;background:#161616;color:#fff;width:100%;cursor:pointer;text-decoration:none;text-align:center;display:block}
    .secondary{background:#eceef1;color:#161616}.danger{background:#9b2626}.success{background:#27743b}
    input,select{width:100%;padding:13px;border:1px solid #ddd;border-radius:12px;font-size:16px;margin-bottom:10px}
    .nav{display:flex;gap:8px;overflow:auto;margin-top:14px}.nav button{width:auto;white-space:nowrap;padding:10px 13px}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.metric{background:#f5f6f8;padding:12px;border-radius:13px}.metric b{font-size:21px;display:block}
    .row{padding:14px 0;border-top:1px solid #eee;word-break:break-word}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    label.switch{display:flex;align-items:center;justify-content:space-between;padding:12px 0}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="muted" style="color:#bbb">Закрытый каталог</div>
    <h1>Declarant BY 🛍️</h1>
    <p>Персональный доступ к закрытому каналу.</p>
  </div>

  <section id="userView">
    <div class="card">
      <h2>Получить доступ</h2>
      <p class="muted">Ссылка привязана к вашему Telegram-аккаунту и действует 10 минут.</p>
      <button id="accessBtn">Получить доступ</button>
      <a id="channelBtn" class="btn hidden" target="_blank">Открыть канал</a>
      <div id="status" class="muted" style="margin-top:12px"></div>
    </div>
  </section>

  <section id="adminView" class="hidden">
    <div class="nav">
      <button data-tab="overview">Статистика</button>
      <button data-tab="create">Создать</button>
      <button data-tab="campaigns">Кампании</button>
      <button data-tab="users">Пользователи</button>
      <button data-tab="settings">Настройки</button>
    </div>

    <div id="tab-overview" class="tab card">
      <h2>Статистика</h2>
      <div class="nav">
        <button data-period="1h">1 час</button>
        <button data-period="24h">24 часа</button>
        <button data-period="7d">7 дней</button>
        <button data-period="all">Всё время</button>
      </div>
      <h3 style="margin-top:18px">🏆 Лучшие кампании</h3>
      <div id="top"></div>
      <h3>Все кампании</h3>
      <div id="stats"></div>
      <button id="exportBtn" class="secondary">Экспорт CSV</button>
    </div>

    <div id="tab-create" class="tab card hidden">
      <h2>Создать рекламную ссылку</h2>
      <select id="source">
        <option value="facebook">Facebook</option>
        <option value="tiktok">TikTok</option>
        <option value="instagram">Instagram</option>
        <option value="other">Другое</option>
      </select>
      <input id="adLabel" placeholder="Метка объявления, например: Видео с девушкой №3">
      <input id="campaignKey" placeholder="Ключ, например: fb_video_3">
      <button id="createCampaign">Создать ссылку</button>
      <div id="createdLink" class="muted" style="margin-top:12px"></div>
    </div>

    <div id="tab-campaigns" class="tab card hidden">
      <h2>Кампании</h2>
      <div id="campaigns"></div>
    </div>

    <div id="tab-users" class="tab card hidden">
      <h2>Пользователи и чёрный список</h2>
      <input id="userSearch" placeholder="@username или Telegram ID">
      <button id="searchUsers">Найти</button>
      <div id="users"></div>
    </div>

    <div id="tab-settings" class="tab card hidden">
      <h2>Уведомления</h2>
      <label class="switch">Новые вступления <input type="checkbox" id="notifyJoins"></label>
      <label class="switch">Выходы и удаления <input type="checkbox" id="notifyLeaves"></label>
      <button id="saveSettings">Сохранить настройки</button>
    </div>
  </section>
</div>

<script>
const tg=window.Telegram.WebApp;
tg.ready();
tg.expand();

const initData=tg.initData;
const currentUser=tg.initDataUnsafe.user||{};
const startParam=tg.initDataUnsafe.start_param||new URLSearchParams(location.search).get("tgWebAppStartParam")||"";
const ADMIN_ID=640314234;

async function api(url,options={}){
  const response=await fetch(url,options);
  const body=await response.json().catch(()=>({}));
  if(!response.ok) throw new Error(body.detail||"Ошибка");
  return body;
}

const statusEl=document.getElementById("status");
const channelBtn=document.getElementById("channelBtn");
const accessBtn=document.getElementById("accessBtn");

accessBtn.onclick=async()=>{
  statusEl.textContent="Создаём ссылку…";
  try{
    const data=await api("/api/access",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({initData,campaign:startParam})
    });
    if(data.silent){
      statusEl.textContent="";
      accessBtn.classList.add("hidden");
      channelBtn.classList.add("hidden");
      return;
    }
    channelBtn.href=data.invite_link;
    channelBtn.classList.remove("hidden");
    statusEl.textContent="Ссылка готова.";
  }catch(error){
    statusEl.textContent=error.message;
  }
};

function showTab(name){
  document.querySelectorAll(".tab").forEach(el=>el.classList.add("hidden"));
  document.getElementById("tab-"+name).classList.remove("hidden");
}
document.querySelectorAll("[data-tab]").forEach(btn=>btn.onclick=()=>showTab(btn.dataset.tab));

async function loadStats(period="24h"){
  const data=await api("/api/admin/stats?period="+period,{
    headers:{"X-Telegram-Init-Data":initData}
  });

  document.getElementById("top").innerHTML=data.top.map((item,index)=>`
    <div class="row">
      <b>${index+1}. ${item.key}</b> · ${item.conversion}%<br>
      <span class="muted">${item.ad_label}</span>
    </div>
  `).join("")||"Нет данных";

  document.getElementById("stats").innerHTML=data.campaigns.map(item=>`
    <div class="row">
      <b>${item.key}</b><br>
      <span class="muted">${item.source} · ${item.ad_label}</span>
      <div class="grid" style="margin-top:10px">
        <div class="metric">Запуски<b>${item.starts}</b></div>
        <div class="metric">Уникальные<b>${item.unique_users}</b></div>
        <div class="metric">Вступили<b>${item.joins}</b></div>
        <div class="metric">В канале<b>${item.active_members}</b></div>
        <div class="metric">Отписались<b>${item.left}</b></div>
        <div class="metric">Конверсия<b>${item.conversion}%</b></div>
      </div>
    </div>
  `).join("")||"Нет данных";
}
document.querySelectorAll("[data-period]").forEach(btn=>btn.onclick=()=>loadStats(btn.dataset.period));

document.getElementById("createCampaign").onclick=async()=>{
  const key=document.getElementById("campaignKey").value;
  const source=document.getElementById("source").value;
  const adLabel=document.getElementById("adLabel").value;
  const target=document.getElementById("createdLink");
  try{
    const data=await api("/api/admin/campaigns",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({initData,key,source,ad_label:adLabel})
    });
    target.innerHTML=`Готово:<br><b>${data.url}</b>`;
    await loadCampaigns();
    await loadStats();
  }catch(error){
    target.textContent=error.message;
  }
};

async function loadCampaigns(){
  const data=await api("/api/admin/campaigns",{
    headers:{"X-Telegram-Init-Data":initData}
  });
  document.getElementById("campaigns").innerHTML=data.campaigns.map(item=>`
    <div class="row">
      <b>${item.key}</b><br>
      <span class="muted">
        ${item.source} · ${item.ad_label}<br>
        ${new Date(item.created_at*1000).toLocaleString()}<br>
        ${item.url}
      </span>
      <button class="secondary" onclick="toggleCampaign('${item.key}')">
        ${item.active?"Отключить":"Включить"}
      </button>
    </div>
  `).join("")||"Нет кампаний";
}

async function toggleCampaign(key){
  await api(`/api/admin/campaigns/${key}/toggle`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({initData})
  });
  await loadCampaigns();
}

async function loadUsers(query=""){
  const data=await api("/api/admin/users?q="+encodeURIComponent(query),{
    headers:{"X-Telegram-Init-Data":initData}
  });
  document.getElementById("users").innerHTML=data.users.map(item=>`
    <div class="row">
      <b>${item.first_name||"Без имени"} ${item.username?"(@"+item.username+")":""}</b><br>
      <span class="muted">
        ID: ${item.user_id}<br>
        Кампания: ${item.campaign||"—"}<br>
        ${item.blocked?"⛔ В чёрном списке":"Статус: "+(item.active?"в канале":"не в канале")}
      </span>
      <div class="actions">
        ${item.blocked
          ? `<button class="success" onclick="unblockUser(${item.user_id})">Разблокировать</button>`
          : `<button class="danger" onclick="blockUser(${item.user_id})">В чёрный список</button>`
        }
      </div>
    </div>
  `).join("")||"Не найдено";
}

document.getElementById("searchUsers").onclick=()=>{
  loadUsers(document.getElementById("userSearch").value);
};

async function blockUser(id){
  await api(`/api/admin/users/${id}/block`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({initData,reason:"manual"})
  });
  await loadUsers(document.getElementById("userSearch").value);
}

async function unblockUser(id){
  await api(`/api/admin/users/${id}/unblock`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({initData})
  });
  await loadUsers(document.getElementById("userSearch").value);
}

async function loadSettings(){
  const data=await api("/api/admin/settings",{
    headers:{"X-Telegram-Init-Data":initData}
  });
  document.getElementById("notifyJoins").checked=data.notify_joins;
  document.getElementById("notifyLeaves").checked=data.notify_leaves;
}

document.getElementById("saveSettings").onclick=async()=>{
  await api("/api/admin/settings",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      initData,
      notify_joins:document.getElementById("notifyJoins").checked,
      notify_leaves:document.getElementById("notifyLeaves").checked
    })
  });
  tg.showAlert("Настройки сохранены");
};

document.getElementById("exportBtn").onclick=async()=>{
  const response=await fetch("/api/admin/export.csv",{
    headers:{"X-Telegram-Init-Data":initData}
  });
  if(!response.ok){
    tg.showAlert("Ошибка экспорта");
    return;
  }
  const blob=await response.blob();
  const url=URL.createObjectURL(blob);
  const link=document.createElement("a");
  link.href=url;
  link.download="telegram_analytics.csv";
  link.click();
  URL.revokeObjectURL(url);
};

if(Number(currentUser.id)===ADMIN_ID){
  document.getElementById("userView").classList.add("hidden");
  document.getElementById("adminView").classList.remove("hidden");
  loadStats();
  loadCampaigns();
  loadUsers();
  loadSettings();
}
</script>
</body>
</html>
