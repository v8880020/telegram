<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Declarant BY</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f5f7;color:#17191c;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.wrap{max-width:820px;margin:auto;padding:16px}.hero{background:#171717;color:#fff;border-radius:24px;padding:24px}
.card{background:#fff;border-radius:20px;padding:18px;margin-top:14px;box-shadow:0 8px 28px rgba(0,0,0,.06)}
h1,h2,h3{margin-top:0}.muted{color:#777;font-size:14px}.hidden{display:none}
button,.btn{border:0;border-radius:13px;padding:14px 16px;font-size:15px;font-weight:700;background:#161616;color:#fff;width:100%;cursor:pointer;text-decoration:none;text-align:center;display:block}
.secondary{background:#eceef1;color:#161616}.danger{background:#9b2626}.success{background:#27743b}
input,select{width:100%;padding:13px;border:1px solid #ddd;border-radius:12px;font-size:16px;margin-bottom:10px}
.nav{display:flex;gap:8px;overflow:auto;margin-top:14px}.nav button{width:auto;white-space:nowrap;padding:10px 13px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.metric{background:#f5f6f8;padding:12px;border-radius:13px}.metric b{font-size:21px;display:block}
.row{padding:14px 0;border-top:1px solid #eee;word-break:break-word}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
label.switch{display:flex;align-items:center;justify-content:space-between;padding:12px 0}
</style>
</head>
<body>
<div class="wrap">
<div class="hero"><div class="muted" style="color:#bbb">Закрытый каталог</div><h1>Declarant BY 🛍️</h1><p>Персональный доступ к закрытому каналу.</p></div>

<section id="userView">
<div class="card"><h2>Получить доступ</h2><p class="muted">Ссылка привязана к вашему Telegram-аккаунту и действует 10 минут.</p>
<button id="accessBtn">Получить доступ</button><a id="channelBtn" class="btn hidden" target="_blank">Открыть канал</a>
<div id="status" class="muted" style="margin-top:12px"></div></div>
</section>

<section id="adminView" class="hidden">
<div class="nav">
<button data-tab="overview">Статистика</button><button data-tab="create">Создать</button><button data-tab="campaigns">Кампании</button><button data-tab="users">Пользователи</button><button data-tab="settings">Настройки</button>
</div>

<div id="tab-overview" class="tab card">
<h2>Статистика</h2>
<div class="nav"><button data-period="1h">1 час</button><button data-period="24h">24 часа</button><button data-period="7d">7 дней</button><button data-period="all">Всё время</button></div>
<h3 style="margin-top:18px">🏆 Лучшие кампании</h3><div id="top"></div>
<h3>Все кампании</h3><div id="stats"></div>
<button id="exportBtn" class="secondary">Экспорт CSV</button>
</div>

<div id="tab-create" class="tab card hidden">
<h2>Создать рекламную ссылку</h2>
<select id="source"><option value="facebook">Facebook</option><option value="tiktok">TikTok</option><option value="instagram">Instagram</option><option value="other">Другое</option></select>
<input id="adLabel" placeholder="Метка объявления, например: Видео с девушкой №3">
<input id="campaignKey" placeholder="Ключ, например: fb_video_3">
<button id="createCampaign">Создать ссылку</button><div id="createdLink" class="muted" style="margin-top:12px"></div>
</div>

<div id="tab-campaigns" class="tab card hidden"><h2>Кампании</h2><div id="campaigns"></div></div>

<div id="tab-users" class="tab card hidden">
<h2>Пользователи и чёрный список</h2><input id="userSearch" placeholder="@username или Telegram ID"><button id="searchUsers">Найти</button><div id="users"></div>
</div>

<div id="tab-settings" class="tab card hidden">
<h2>Уведомления</h2>
<label class="switch">Новые вступления <input type="checkbox" id="notifyJoins"></label>
<label class="switch">Выходы и удаления <input type="checkbox" id="notifyLeaves"></label>
<button id="saveSettings">Сохранить настройки</button>
</div>
</section>
</div>

<script>
const tg=Telegram.WebApp;tg.ready();tg.expand();
const initData=tg.initData;const user=tg.initDataUnsafe.user||{};const startParam=tg.initDataUnsafe.start_param||"";
const ADMIN_ID=640314234;
async function api(url,options={}){const r=await fetch(url,options);const b=await r.json().catch(()=>({}));if(!r.ok)throw new Error(b.detail||"Ошибка");return b}
const statusEl=document.getElementById("status"),channelBtn=document.getElementById("channelBtn");

document.getElementById("accessBtn").onclick=async()=>{
 statusEl.textContent="Создаём ссылку…";
 try{
  const d=await api("/api/access",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({initData,campaign:startParam})});
  if(d.blocked||d.already_used){statusEl.textContent="";document.getElementById("accessBtn").classList.add("hidden");return}
  channelBtn.href=d.invite_link;channelBtn.classList.remove("hidden");statusEl.textContent="Ссылка готова.";
 }catch(e){statusEl.textContent=e.message}
};

function showTab(name){document.querySelectorAll(".tab").forEach(x=>x.classList.add("hidden"));document.getElementById("tab-"+name).classList.remove("hidden")}
document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>showTab(b.dataset.tab));

async function loadStats(period="24h"){
 const d=await api("/api/admin/stats?period="+period,{headers:{"X-Telegram-Init-Data":initData}});
 document.getElementById("top").innerHTML=d.top.map((c,i)=>`<div class="row"><b>${i+1}. ${c.key}</b> · ${c.conversion}%<br><span class="muted">${c.ad_label}</span></div>`).join("")||"Нет данных";
 document.getElementById("stats").innerHTML=d.campaigns.map(c=>`<div class="row"><b>${c.key}</b><br><span class="muted">${c.source} · ${c.ad_label}</span><div class="grid" style="margin-top:10px">
 <div class="metric">Запуски<b>${c.starts}</b></div><div class="metric">Уникальные<b>${c.unique_users}</b></div><div class="metric">Вступили<b>${c.joins}</b></div><div class="metric">В канале<b>${c.active_members}</b></div><div class="metric">Отписались<b>${c.left}</b></div><div class="metric">Конверсия<b>${c.conversion}%</b></div></div></div>`).join("")||"Нет данных";
}
document.querySelectorAll("[data-period]").forEach(b=>b.onclick=()=>loadStats(b.dataset.period));

document.getElementById("createCampaign").onclick=async()=>{
 try{
  const d=await api("/api/admin/campaigns",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({initData,key:campaignKey.value,source:source.value,ad_label:adLabel.value})});
  createdLink.innerHTML=`Готово:<br><b>${d.url}</b>`;loadCampaigns();loadStats();
 }catch(e){createdLink.textContent=e.message}
};

async function loadCampaigns(){
 const d=await api("/api/admin/campaigns",{headers:{"X-Telegram-Init-Data":initData}});
 campaigns.innerHTML=d.campaigns.map(c=>`<div class="row"><b>${c.key}</b><br><span class="muted">${c.source} · ${c.ad_label}<br>${new Date(c.created_at).toLocaleString()}<br>${c.url}</span>
 <button class="secondary" onclick="toggleCampaign('${c.key}')">${c.active?"Отключить":"Включить"}</button></div>`).join("")||"Нет кампаний";
}
async function toggleCampaign(key){await api(`/api/admin/campaigns/${key}/toggle`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({initData})});loadCampaigns()}

async function loadUsers(q=""){
 const d=await api("/api/admin/users?q="+encodeURIComponent(q),{headers:{"X-Telegram-Init-Data":initData}});
 users.innerHTML=d.users.map(u=>`<div class="row"><b>${u.first_name||"Без имени"} ${u.username?"(@"+u.username+")":""}</b><br><span class="muted">ID: ${u.user_id}<br>Кампания: ${u.campaign||"—"}<br>${u.blocked?"⛔ В чёрном списке":"Статус: "+(u.active?"в канале":"не в канале")}</span>
 <div class="actions">${u.blocked?`<button class="success" onclick="unblockUser(${u.user_id})">Разблокировать</button>`:`<button class="danger" onclick="blockUser(${u.user_id})">В чёрный список</button>`}</div></div>`).join("")||"Не найдено";
}
searchUsers.onclick=()=>loadUsers(userSearch.value);
async function blockUser(id){await api(`/api/admin/users/${id}/block`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({initData,reason:"manual"})});loadUsers(userSearch.value)}
async function unblockUser(id){await api(`/api/admin/users/${id}/unblock`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({initData})});loadUsers(userSearch.value)}

async function loadSettings(){const d=await api("/api/admin/settings",{headers:{"X-Telegram-Init-Data":initData}});notifyJoins.checked=d.notify_joins;notifyLeaves.checked=d.notify_leaves}
saveSettings.onclick=async()=>{await api("/api/admin/settings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({initData,notify_joins:notifyJoins.checked,notify_leaves:notifyLeaves.checked})});tg.showAlert("Сохранено")}

exportBtn.onclick=async()=>{const r=await fetch("/api/admin/export.csv",{headers:{"X-Telegram-Init-Data":initData}});const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="telegram_analytics.csv";a.click();URL.revokeObjectURL(u)}

if(Number(user.id)===ADMIN_ID){userView.classList.add("hidden");adminView.classList.remove("hidden");loadStats();loadCampaigns();loadUsers();loadSettings()}
</script>
</body>
</html>
